# Runs the DevDigest reviewer (agent-runner → reviewer-core engine) on every PR.
# The action lives in this repo (./agent-runner) and reads agent manifests from
# .devdigest/agents/*.yaml. `all: true` runs every agent in that folder.
#
# Same-repo branch PRs (your own fork) get secrets + a writable GITHUB_TOKEN, so
# the review can be posted. External-fork PRs get no secrets by design — the post
# step is then skipped (no key leak).
#
# One-time setup: add an Actions secret OPENROUTER_API_KEY (Settings → Secrets and
# variables → Actions). GITHUB_TOKEN is provided automatically.
name: DevDigest Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./agent-runner
        with:
          all: 'true' # run every agent in .devdigest/agents
          post: github-review
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: devdigest-result
          path: devdigest-result.json
          if-no-files-found: ignore
